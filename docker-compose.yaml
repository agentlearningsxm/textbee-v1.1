services:
  # MongoDB service
  textbee-db:
    container_name: textbee-db
    image: mongo:latest
    restart: always
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-adminUser}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS:-adminPassword}
      - MONGO_INITDB_DATABASE=textbee
    volumes:
      # - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
      - mongodb_data:/data/db
    ports:
      - "${MONGO_PORT:-27018}:27017"
    networks:
      - textbee-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # MongoDB Express (optional admin UI)
  mongo-express:
    container_name: textbee-mongo-express
    image: mongo-express:latest
    restart: always
    ports:
      - "${MONGO_EXPRESS_PORT:-8081}:8081"
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=${MONGO_ROOT_USER:-adminUser}
      - ME_CONFIG_MONGODB_ADMINPASSWORD=${MONGO_ROOT_PASS:-adminPassword}
      - ME_CONFIG_MONGODB_SERVER=textbee-db
    depends_on:
      textbee-db:
        condition: service_healthy
    networks:
      - textbee-network

  # NestJS API
  textbee-api:
    container_name: textbee-api
    # image: ghcr.io/vernu/textbee/api:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${API_PORT:-3003}:3003"
    env_file:
      - ./api/.env
    environment:
      - PORT=${API_PORT:-3003}
      - MONGO_URI=mongodb://adminUser:adminPassword@textbee-db:27017/textbee?authSource=admin
      - REDIS_URL=${REDIS_URL:-redis://textbee-redis:6379}
      - MAIL_HOST=mailhog
      - MAIL_PORT=1025
      - MAIL_USER=
      - MAIL_PASS=
      - MAIL_FROM=noreply@textbee-local.dev
      - FRONTEND_URL=http://localhost:3002
      - REGISTRATION_MODE=invite_only
      - JWT_SECRET=local-dev-jwt-secret-change-in-prod
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CLOUDFLARE_TURNSTILE_SECRET_KEY=${CLOUDFLARE_TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}

    depends_on:
      textbee-db:
        condition: service_healthy
    networks:
      - textbee-network

  # Next.js Web
  textbee-web:
    container_name: textbee-web
    # image: ghcr.io/vernu/textbee/web:latest
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_TURNSTILE_SITE_KEY=${NEXT_PUBLIC_TURNSTILE_SITE_KEY:-1x00000000000000000000AA}
        - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3003/api/v1}
        - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3002}
        - NEXT_PUBLIC_REGISTRATION_MODE=${NEXT_PUBLIC_REGISTRATION_MODE:-invite_only}
    restart: always
    ports:
      - "${WEB_PORT:-3002}:3002"
    env_file:
      - ./web/.env
    environment:
      - PORT=${WEB_PORT:-3002}
      - CONTAINER_RUNTIME=docker
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3003/api/v1}

    depends_on:
      - textbee-api
    networks:
      - textbee-network

  # MailHog - local test mail server (catches all emails, view at localhost:8025)
  mailhog:
    container_name: textbee-mailhog
    image: mailhog/mailhog:latest
    restart: always
    ports:
      - "1025:1025"   # SMTP server
      - "8025:8025"   # Web UI
    networks:
      - textbee-network

  # Redis (if SMS queue is needed)
  textbee-redis:
    container_name: textbee-redis
    image: redis:alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - textbee-network
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  textbee-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
